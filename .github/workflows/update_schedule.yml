name: U18 일정 증분 갱신

on:
  schedule:
    # 시간은 UTC 기준 (KST = UTC + 9). 정각 혼잡을 피해 17분으로 설정.
    # 완료 경기는 보존하고 예정·신규(누락 포함)만 재수집하는 증분 갱신.
    - cron: "17 3 * * *"     # 매일 12:17 KST
    - cron: "17 9 * * *"     # 매일 18:17 KST
    - cron: "17 12 * * *"    # 매일 21:17 KST
  workflow_dispatch: {}   # GitHub에서 수동 실행도 가능

permissions:
  contents: write

# update.yml과 같은 그룹 → 두 워크플로우가 동시에 돌지 않고 순차 대기 (push 충돌 방지)
concurrency:
  group: u18-update
  cancel-in-progress: false

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 일정 증분 수집 + 빌드
        run: python build_all.py --incremental

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/u18_schedule.html docs/u18_schedule_data.js u18_schedule.json u18_schedule.html u18_schedule_data.js
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "일정 증분 갱신 ($(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST'))"
            git push
          fi
