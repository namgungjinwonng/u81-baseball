name: U18 전체 갱신 (수동)

on:
  workflow_dispatch: {}   # 수동 실행 전용. 완료 경기 정정까지 포함한 전체 재수집용.

permissions:
  contents: write

concurrency:
  group: u18-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 + 빌드
        run: python build_all.py

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ u18_data.json u18_schedule.json u18_players.html u18_schedule.html u18_app_data.js u18_schedule_data.js
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "자동 데이터 갱신 ($(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST'))"
            git push
          fi
