name: U18 선수 갱신 (선수만)

on:
  schedule:
    # 시간은 UTC 기준 (KST = UTC + 9). 정각 혼잡을 피해 17분으로 설정.
    - cron: "17 1 * * *"   # 매일 10:17 KST
  workflow_dispatch: {}   # GitHub에서 수동 실행도 가능

permissions:
  contents: write

# 다른 워크플로우와 같은 그룹 → 동시 실행 방지 (push 충돌 방지)
concurrency:
  group: u18-update
  cancel-in-progress: false

jobs:
  update-rosters:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 선수 수집 + 빌드 (선수만)
        run: python build_all.py --rosters-only

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/u18_players.html docs/u18_app_data.js u18_data.json u18_players.html u18_app_data.js
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "선수 데이터 갱신 ($(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST'))"
            git push
          fi
