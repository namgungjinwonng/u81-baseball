name: U18 오늘 일정 재수집 (수동)

on:
  workflow_dispatch: {}   # 수동 실행 전용 (필요할 때 버튼으로 실행)

permissions:
  contents: write

# update.yml / update_schedule.yml과 같은 그룹 → 동시 실행 방지 (push 충돌 방지)
concurrency:
  group: u18-update
  cancel-in-progress: false

jobs:
  update-today:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 오늘 일정만 재수집 + 빌드
        run: python build_all.py --today

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/u18_schedule.html docs/u18_schedule_data.js u18_schedule.json u18_schedule.html u18_schedule_data.js
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "오늘 일정 재수집 ($(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST'))"
            git push
          fi
