// ========== APPLICATION LOGIC ==========
let currentView = 'team';
let sortField = 'team';
let sortDir = 'asc';

function getAllPlayers() {
  const all = [];
  teamsData.forEach(team => {
    team.players.forEach(p => {
      all.push({...p, team: team.name, region: team.region});
    });
  });
  return all;
}

function updateStats() {
  const players = getAllPlayers();
  document.getElementById('totalTeams').textContent = allTeamsList.length;
  document.getElementById('totalPlayers').textContent = players.length;
  document.getElementById('totalPitchers').textContent = players.filter(p=>p.pos==='투수').length;
  document.getElementById('totalCatchers').textContent = players.filter(p=>p.pos==='포수').length;
  document.getElementById('totalInfielders').textContent = players.filter(p=>p.pos==='내야수').length;
  document.getElementById('totalOutfielders').textContent = players.filter(p=>p.pos==='외야수').length;
}

function getFilters() {
  return {
    search: document.getElementById('searchInput').value.toLowerCase(),
    region: document.getElementById('regionFilter').value,
    pos: document.getElementById('posFilter').value,
    grade: document.getElementById('gradeFilter').value
  };
}

function matchesFilter(player, team, filters) {
  if (filters.search && !player.name.includes(filters.search) && !team.name.toLowerCase().includes(filters.search) && !team.region.includes(filters.search)) return false;
  if (filters.region && team.region !== filters.region) return false;
  if (filters.pos && player.pos !== filters.pos) return false;
  if (filters.grade && String(player.grade) !== filters.grade) return false;
  return true;
}

function renderTeamView() {
  const filters = getFilters();
  let html = '';
  teamsData.forEach((team, idx) => {
    const filtered = team.players.filter(p => matchesFilter(p, team, filters));
    if (filtered.length === 0 && (filters.search || filters.pos || filters.grade)) return;
    if (filters.region && team.region !== filters.region) return;

    html += `<div class="team-section">
      <div class="team-header" onclick="toggleTeam(${idx})">
        <div>
          <h2>${team.name}</h2>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div class="meta">
            <span>${team.region}</span>
            <span>감독: ${team.manager}</span>
            <span>선수 ${filtered.length}명</span>
          </div>
          <span class="toggle">&#9660;</span>
        </div>
      </div>
      <div class="team-body" id="teamBody${idx}">
        <div class="staff-list">`;
    team.staff.forEach(s => {
      html += `<span class="staff-badge ${s.role==='코치'?'coach':''}">${s.role}: ${s.name}</span>`;
    });
    html += `</div><table><thead><tr>
      <th>등번호</th><th>성명</th><th>포지션</th><th>학년</th><th>신장</th><th>체중</th><th>투타</th>
    </tr></thead><tbody>`;
    filtered.forEach(p => {
      const posClass = 'pos-' + (p.pos || '미지정');
      html += `<tr>
        <td>${p.num || '-'}</td>
        <td><strong>${p.name}</strong></td>
        <td><span class="pos-badge ${posClass}">${p.pos || '미지정'}</span></td>
        <td><span class="grade-badge grade-${p.grade}">${p.grade}</span></td>
        <td>${p.height || '-'}</td>
        <td>${p.weight || '-'}</td>
        <td>${p.bt || '-'}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  });
  document.getElementById('teamView').innerHTML = html || '<div class="team-section"><p style="padding:20px;text-align:center;color:#999;">검색 결과가 없습니다.</p></div>';
}

function renderPlayerView() {
  const filters = getFilters();
  let players = getAllPlayers().filter(p => {
    if (filters.search && !p.name.includes(filters.search) && !p.team.toLowerCase().includes(filters.search) && !p.region.includes(filters.search)) return false;
    if (filters.region && p.region !== filters.region) return false;
    if (filters.pos && p.pos !== filters.pos) return false;
    if (filters.grade && String(p.grade) !== filters.grade) return false;
    return true;
  });

  players.sort((a, b) => {
    let va, vb;
    switch(sortField) {
      case 'team': va = a.team; vb = b.team; break;
      case 'region': va = a.region; vb = b.region; break;
      case 'num': va = a.num||999; vb = b.num||999; return sortDir==='asc' ? va-vb : vb-va;
      case 'name': va = a.name; vb = b.name; break;
      case 'pos': va = a.pos||''; vb = b.pos||''; break;
      case 'grade': return sortDir==='asc' ? a.grade-b.grade : b.grade-a.grade;
      case 'height': va = parseInt(a.height)||0; vb = parseInt(b.height)||0; return sortDir==='asc' ? va-vb : vb-va;
      case 'weight': va = parseInt(a.weight)||0; vb = parseInt(b.weight)||0; return sortDir==='asc' ? va-vb : vb-va;
      default: va = a.name; vb = b.name;
    }
    if (typeof va === 'string') return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return 0;
  });

  let html = '';
  players.forEach(p => {
    const posClass = 'pos-' + (p.pos || '미지정');
    html += `<tr>
      <td>${p.team}</td>
      <td>${p.region}</td>
      <td>${p.num || '-'}</td>
      <td><strong>${p.name}</strong></td>
      <td><span class="pos-badge ${posClass}">${p.pos || '미지정'}</span></td>
      <td><span class="grade-badge grade-${p.grade}">${p.grade}</span></td>
      <td>${p.height || '-'}</td>
      <td>${p.weight || '-'}</td>
      <td>${p.bt || '-'}</td>
    </tr>`;
  });
  document.getElementById('playerTableBody').innerHTML = html;
}

function renderAllTeams() {
  const filters = getFilters();
  let teams = allTeamsList.filter(t => {
    if (filters.region && t.region !== filters.region) return false;
    if (filters.search && !t.name.toLowerCase().includes(filters.search) && !t.manager.includes(filters.search) && !t.region.includes(filters.search)) return false;
    return true;
  });
  let html = '';
  teams.forEach((t, i) => {
    const hasDetail = teamsData.find(td => td.name === t.name);
    html += `<tr>
      <td>${i+1}</td>
      <td><strong>${t.name}</strong></td>
      <td>${t.region}</td>
      <td>${t.manager}</td>
      <td>${t.players}</td>
      <td>${hasDetail ? '<span style="color:green;font-weight:bold;">상세정보 있음</span>' :
        `<a href="https://www.korea-baseball.com/info/team/team_player?club_idx=${t.idx}&season=2026&kind_cd=31&sports_club=F" target="_blank" style="color:#1a237e;">사이트에서 보기</a>`}</td>
    </tr>`;
  });
  document.getElementById('allTeamsBody').innerHTML = html;
}

let activePosFilter = '전체';

function showView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('teamView').style.display = view==='team' ? 'block' : 'none';
  document.getElementById('positionView').style.display = view==='position' ? 'block' : 'none';
  document.getElementById('playerView').style.display = view==='player' ? 'block' : 'none';
  document.getElementById('allTeamsView').style.display = view==='allteams' ? 'block' : 'none';
  document.getElementById('posFilterBtns').classList.toggle('visible', view==='position');
  render();
}

function toggleTeam(idx) {
  const body = document.getElementById('teamBody' + idx);
  body.classList.toggle('collapsed');
}

function togglePosGroup(pos) {
  const body = document.getElementById('posBody_' + pos);
  body.classList.toggle('collapsed');
}

function filterByPos(pos) {
  activePosFilter = pos;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.pos-btn').classList.add('active', pos === '전체' ? '전체' : pos);
  renderPositionView();
}

function renderPositionView() {
  const filters = getFilters();
  const allPlayers = getAllPlayers().filter(p => {
    if (filters.search && !p.name.includes(filters.search) && !p.team.toLowerCase().includes(filters.search) && !p.region.includes(filters.search)) return false;
    if (filters.region && p.region !== filters.region) return false;
    if (filters.grade && String(p.grade) !== filters.grade) return false;
    return true;
  });

  const positions = ['투수','포수','내야수','외야수'];
  const grouped = {};
  positions.forEach(pos => { grouped[pos] = []; });
  allPlayers.forEach(p => {
    if (grouped[p.pos]) grouped[p.pos].push(p);
  });

  // Update button counts
  document.getElementById('posBtnAll').textContent = allPlayers.filter(p=>positions.includes(p.pos)).length;
  document.getElementById('posBtnP').textContent = grouped['투수'].length;
  document.getElementById('posBtnC').textContent = grouped['포수'].length;
  document.getElementById('posBtnIF').textContent = grouped['내야수'].length;
  document.getElementById('posBtnOF').textContent = grouped['외야수'].length;

  const showPositions = activePosFilter === '전체' ? positions : [activePosFilter];
  const icons = {투수:'P', 포수:'C', 내야수:'IF', 외야수:'OF'};

  let html = '<div class="pos-view-container">';
  showPositions.forEach(pos => {
    const players = grouped[pos];
    if (!players || players.length === 0) return;

    // Calculate stats
    const avgHeight = players.filter(p=>p.height&&p.height!=='-').reduce((s,p)=>s+parseInt(p.height),0) / (players.filter(p=>p.height&&p.height!=='-').length || 1);
    const avgWeight = players.filter(p=>p.weight&&p.weight!=='-').reduce((s,p)=>s+parseInt(p.weight),0) / (players.filter(p=>p.weight&&p.weight!=='-').length || 1);
    const g1 = players.filter(p=>p.grade===1).length;
    const g2 = players.filter(p=>p.grade===2).length;
    const g3 = players.filter(p=>p.grade===3).length;
    const leftHand = players.filter(p=>p.bt && p.bt.startsWith('좌투')).length;
    const teamCount = new Set(players.map(p=>p.team)).size;

    html += `<div class="pos-group">
      <div class="pos-group-header pos-${pos}-border" onclick="togglePosGroup('${pos}')">
        <div class="pos-icon ${pos}">${icons[pos]}</div>
        <div>
          <div class="pos-group-title">${pos}</div>
          <div class="pos-group-count">${players.length}명 | ${teamCount}개 팀</div>
        </div>
        <span class="pos-group-toggle">&#9660;</span>
      </div>
      <div class="pos-group-body" id="posBody_${pos}">
        <div class="pos-stats-row">
          <div class="pos-stat-chip">평균 신장 <strong>${avgHeight.toFixed(1)}cm</strong></div>
          <div class="pos-stat-chip">평균 체중 <strong>${avgWeight.toFixed(1)}kg</strong></div>
          <div class="pos-stat-chip">1학년 <strong>${g1}명</strong></div>
          <div class="pos-stat-chip">2학년 <strong>${g2}명</strong></div>
          <div class="pos-stat-chip">3학년 <strong>${g3}명</strong></div>
          ${pos === '투수' ? `<div class="pos-stat-chip">좌투 <strong>${leftHand}명</strong></div>` : ''}
        </div>
        <table>
          <thead><tr>
            <th>소속팀</th><th>지역</th><th>등번호</th><th>성명</th>
            <th>학년</th><th>신장</th><th>체중</th><th>투타</th>
          </tr></thead>
          <tbody>`;
    players.sort((a,b) => {
      const hA = parseInt(a.height)||0, hB = parseInt(b.height)||0;
      return hB - hA;
    });
    players.forEach(p => {
      html += `<tr>
        <td>${p.team}</td><td>${p.region}</td><td>${p.num||'-'}</td>
        <td><strong>${p.name}</strong></td>
        <td><span class="grade-badge grade-${p.grade}">${p.grade}</span></td>
        <td>${p.height||'-'}</td><td>${p.weight||'-'}</td><td>${p.bt||'-'}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  });
  html += '</div>';
  document.getElementById('positionView').innerHTML = html;
}

function sortPlayers(field) {
  if (sortField === field) sortDir = sortDir==='asc' ? 'desc' : 'asc';
  else { sortField = field; sortDir = 'asc'; }
  renderPlayerView();
}

function render() {
  if (currentView === 'team') renderTeamView();
  else if (currentView === 'position') renderPositionView();
  else if (currentView === 'player') renderPlayerView();
  else renderAllTeams();
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('regionFilter').addEventListener('change', render);
document.getElementById('posFilter').addEventListener('change', render);
document.getElementById('gradeFilter').addEventListener('change', render);

// Init
updateStats();
render();
</script>
</body>
</html>
